groups:
  - name: DitakNet Configuration
    description: Configure DitakNet application settings
  - name: User and Group Configuration
    description: Configure the non-root identity used by DitakNet
  - name: Network Configuration
    description: Configure bridge or host networking for DitakNet
  - name: Storage Configuration
    description: Configure persistent storage for DitakNet
  - name: Resources Configuration
    description: Configure CPU and memory limits

questions:
  - variable: TZ
    group: DitakNet Configuration
    label: Timezone
    schema:
      type: string
      default: Etc/UTC
      required: true
      $ref:
        - definitions/timezone

  - variable: ditaknet
    label: ""
    group: DitakNet Configuration
    schema:
      type: dict
      attrs:
        - variable: app_base_url
          label: Public Base URL
          description: Optional external HTTPS URL used to access DitakNet.
          schema:
            type: string
            default: ""
        - variable: discovery_dns_servers
          label: LAN DNS Servers
          description: Optional comma-separated LAN DNS server addresses used for hostname discovery.
          schema:
            type: string
            default: ""
        - variable: update_channel
          label: Signed Update Channel
          description: Stable receives production releases; Beta may receive signed prereleases. Containers are never updated automatically.
          schema:
            type: string
            default: stable
            required: true
            enum:
              - value: stable
                description: Stable production releases only
              - value: beta
                description: Signed beta/prerelease and stable releases

  - variable: run_as
    label: ""
    group: User and Group Configuration
    schema:
      type: dict
      attrs:
        - variable: user
          label: User ID
          description: Non-root UID that owns and writes DitakNet persistent data.
          schema:
            type: int
            min: 568
            default: 568
            required: true
        - variable: group
          label: Group ID
          description: Non-root GID that owns and writes DitakNet persistent data.
          schema:
            type: int
            min: 568
            default: 568
            required: true

  - variable: network
    label: ""
    group: Network Configuration
    schema:
      type: dict
      attrs:
        - variable: host_network
          label: Host Network
          description: |
            Enable only when direct LAN discovery, ARP, or ICMP visibility is
            required. DitakNet then shares the TrueNAS network namespace and
            binds directly to host port 5833. Port publishing is disabled.
          schema:
            type: boolean
            default: false
        - variable: web_port
          label: WebUI Port
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port Bind Mode
                schema:
                  type: string
                  default: published
                  enum:
                    - value: published
                      description: Publish the port on selected host addresses
                    - value: exposed
                      description: Expose the port only to other containers
                    - value: ""
                      description: Do not publish or expose the port
              - variable: port_number
                label: Port Number
                schema:
                  type: int
                  default: 5833
                  min: 1
                  max: 65535
                  required: true
              - variable: host_ips
                label: Host IPs
                description: Host addresses on which to publish the bridge-mode WebUI.
                schema:
                  type: list
                  show_if: [["bind_mode", "=", "published"]]
                  default: []
                  items:
                    - variable: host_ip
                      label: Host IP
                      schema:
                        type: string
                        required: true
                        $ref:
                          - definitions/node_bind_ip

  - variable: storage
    label: ""
    group: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: data
          label: DitakNet Data
          description: Database, generated session key, and runtime state (/app/data).
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                description: Use Host Path datasets for production and ixVolume only for evaluation.
                schema:
                  type: string
                  required: true
                  default: ix_volume
                  enum:
                    - value: host_path
                      description: Host Path (recommended for production)
                    - value: ix_volume
                      description: ixVolume (convenient for evaluation)
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        default: data
                        required: true
                        hidden: true
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      description: Add an ACL entry granting the run-as UID/GID full control.
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - normalize/acl
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true
                    - variable: auto_permissions
                      label: Automatic Permissions
                      description: |
                        For a new or empty dataset, let the TrueNAS permissions
                        helper set top-level ownership to the configured run-as
                        UID/GID. Snapshot existing data before enabling this.
                      schema:
                        type: boolean
                        default: false
                        show_if: [["acl_enable", "=", false]]

        - variable: logs
          label: DitakNet Logs
          description: Rotating application logs (/app/logs).
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  required: true
                  default: ix_volume
                  enum:
                    - value: host_path
                      description: Host Path (recommended for production)
                    - value: ix_volume
                      description: ixVolume (convenient for evaluation)
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        default: logs
                        required: true
                        hidden: true
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - normalize/acl
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true
                    - variable: auto_permissions
                      label: Automatic Permissions
                      description: Snapshot existing data before allowing ownership changes.
                      schema:
                        type: boolean
                        default: false
                        show_if: [["acl_enable", "=", false]]

        - variable: backups
          label: DitakNet Backups
          description: Backup archives created by DitakNet (/app/backups).
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  required: true
                  default: ix_volume
                  enum:
                    - value: host_path
                      description: Host Path (recommended for production)
                    - value: ix_volume
                      description: ixVolume (convenient for evaluation)
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        default: backups
                        required: true
                        hidden: true
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - normalize/acl
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true
                    - variable: auto_permissions
                      label: Automatic Permissions
                      description: Snapshot existing data before allowing ownership changes.
                      schema:
                        type: boolean
                        default: false
                        show_if: [["acl_enable", "=", false]]

        - variable: plugins
          label: DitakNet Plugins
          description: Optional user-installed plugins (/app/plugins).
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  required: true
                  default: ix_volume
                  enum:
                    - value: host_path
                      description: Host Path (recommended for production)
                    - value: ix_volume
                      description: ixVolume (convenient for evaluation)
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        default: plugins
                        required: true
                        hidden: true
                    - variable: acl_entries
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: acl_enable
                      label: Enable ACL
                      schema:
                        type: boolean
                        default: false
                    - variable: acl
                      label: ACL Configuration
                      schema:
                        type: dict
                        show_if: [["acl_enable", "=", true]]
                        attrs: []
                        $ref:
                          - normalize/acl
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        show_if: [["acl_enable", "=", false]]
                        required: true
                    - variable: auto_permissions
                      label: Automatic Permissions
                      description: Snapshot existing data before allowing ownership changes.
                      schema:
                        type: boolean
                        default: false
                        show_if: [["acl_enable", "=", false]]

  - variable: resources
    label: ""
    group: Resources Configuration
    schema:
      type: dict
      attrs:
        - variable: limits
          label: Limits
          schema:
            type: dict
            attrs:
              - variable: cpus
                label: CPUs
                schema:
                  type: int
                  min: 1
                  default: 2
                  required: true
              - variable: memory
                label: Memory (in MB)
                schema:
                  type: int
                  min: 512
                  default: 2048
                  required: true
