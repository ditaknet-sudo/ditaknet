groups:
  - name: DitakNet Configuration
    description: DitakNet application settings
  - name: Network Configuration
    description: Configure networking for DitakNet
  - name: Storage Configuration
    description: Persistent storage for DitakNet
  - name: Resources Configuration
    description: CPU and memory limits

questions:
  - variable: TZ
    group: DitakNet Configuration
    label: Timezone
    schema:
      type: string
      default: Etc/UTC
      required: true
      $ref:
        - definitions/timezone

  - variable: ditaknet
    label: ""
    group: DitakNet Configuration
    schema:
      type: dict
      attrs:
        - variable: image_tag
          label: Image Tag
          description: |
            SemVer tag published to GHCR (example 2.0.1).
            Use latest only for testing.
          schema:
            type: string
            default: "2.0.1"
            required: true
        - variable: additional_envs
          label: Additional Environment Variables
          schema:
            type: list
            default: []
            items:
              - variable: env
                label: Environment Variable
                schema:
                  type: dict
                  attrs:
                    - variable: name
                      label: Name
                      schema:
                        type: string
                        required: true
                    - variable: value
                      label: Value
                      schema:
                        type: string

  - variable: network
    label: ""
    group: Network Configuration
    schema:
      type: dict
      attrs:
        - variable: host_network
          label: Host Network
          description: |
            Recommended for accurate LAN discovery / ARP.
            When enabled, port publish settings are ignored and
            DitakNet binds to host port 5833.
          schema:
            type: boolean
            default: false
        - variable: web_port
          label: WebUI Port
          schema:
            type: dict
            attrs:
              - variable: bind_mode
                label: Port Bind Mode
                schema:
                  type: string
                  default: "published"
                  enum:
                    - value: "published"
                      description: Publish port on the host
                    - value: "exposed"
                      description: Expose for inter-container only
                    - value: ""
                      description: None
              - variable: port_number
                label: Port Number
                schema:
                  type: int
                  default: 5833
                  min: 1
                  max: 65535
                  required: true

  - variable: storage
    label: ""
    group: Storage Configuration
    schema:
      type: dict
      attrs:
        - variable: data
          label: DitakNet Data
          description: Database and runtime state (/app/data)
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  default: ix_volume
                  enum:
                    - value: ix_volume
                      description: ixVolume
                    - value: host_path
                      description: Host Path
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        default: ditaknet_data
                        required: true
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        required: true
        - variable: logs
          label: DitakNet Logs
          description: Application logs (/app/logs)
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  default: ix_volume
                  enum:
                    - value: ix_volume
                      description: ixVolume
                    - value: host_path
                      description: Host Path
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        default: ditaknet_logs
                        required: true
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        required: true
        - variable: backups
          label: DitakNet Backups
          description: Backup archives (/app/backups)
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  default: ix_volume
                  enum:
                    - value: ix_volume
                      description: ixVolume
                    - value: host_path
                      description: Host Path
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        default: ditaknet_backups
                        required: true
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        required: true
        - variable: plugins
          label: DitakNet Plugins
          description: Optional plugins (/app/plugins)
          schema:
            type: dict
            attrs:
              - variable: type
                label: Type
                schema:
                  type: string
                  default: ix_volume
                  enum:
                    - value: ix_volume
                      description: ixVolume
                    - value: host_path
                      description: Host Path
              - variable: ix_volume_config
                label: ixVolume Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "ix_volume"]]
                  $ref:
                    - normalize/ix_volume
                  attrs:
                    - variable: dataset_name
                      label: Dataset Name
                      schema:
                        type: string
                        default: ditaknet_plugins
                        required: true
              - variable: host_path_config
                label: Host Path Configuration
                schema:
                  type: dict
                  show_if: [["type", "=", "host_path"]]
                  attrs:
                    - variable: path
                      label: Host Path
                      schema:
                        type: hostpath
                        required: true

  - variable: resources
    label: ""
    group: Resources Configuration
    schema:
      type: dict
      attrs:
        - variable: limits
          label: Limits
          schema:
            type: dict
            attrs:
              - variable: cpus
                label: CPUs
                schema:
                  type: int
                  default: 2
                  required: true
              - variable: memory
                label: Memory (in MB)
                schema:
                  type: int
                  default: 2048
                  required: true
