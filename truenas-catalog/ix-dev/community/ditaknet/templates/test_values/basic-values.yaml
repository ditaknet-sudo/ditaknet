# Bridge-network + ixVolume values used by the official truenas/apps renderer.
TZ: Etc/UTC

ditaknet:
  app_base_url: ""
  discovery_dns_servers: ""
  update_channel: stable

run_as:
  user: 568
  group: 568

network:
  host_network: false
  web_port:
    bind_mode: published
    port_number: 5833
    host_ips: []

ix_volumes:
  data: /opt/tests/mnt/ditaknet/data
  logs: /opt/tests/mnt/ditaknet/logs
  backups: /opt/tests/mnt/ditaknet/backups
  plugins: /opt/tests/mnt/ditaknet/plugins

storage:
  data:
    type: ix_volume
    ix_volume_config:
      dataset_name: data
      create_host_path: true
  logs:
    type: ix_volume
    ix_volume_config:
      dataset_name: logs
      create_host_path: true
  backups:
    type: ix_volume
    ix_volume_config:
      dataset_name: backups
      create_host_path: true
  plugins:
    type: ix_volume
    ix_volume_config:
      dataset_name: plugins
      create_host_path: true

resources:
  limits:
    cpus: 2
    memory: 2048

ci: true
