name: DitakNet CI and GHCR release

# Pull requests and main always run quality/image gates. Only an exact vX.Y.Z
# tag, or a manual run from the default branch, may reach the publish job.
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Exact stable version without v prefix (for example 2.0.1)"
        required: true
        type: string

concurrency:
  # Serialize every tag/manual release so two publishers cannot race the
  # immutable-tag check. PRs and ordinary branch builds keep separate groups.
  group: ${{ github.workflow }}-${{ (github.event_name == 'workflow_dispatch' || github.ref_type == 'tag') && 'release' || github.ref }}
  cancel-in-progress: false

# The default token is read-only. Only the final publish job receives package
# write access, and that job cannot start until every gate succeeds.
permissions:
  contents: read

env:
  IMAGE: ghcr.io/ditaknet-sudo/ditaknet
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  quality:
    name: Python, security and configuration gates
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      version: ${{ steps.release.outputs.version }}
      build_date: ${{ steps.release.outputs.build_date }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve and validate release version
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="${REQUESTED_VERSION#v}"
          elif [[ "$REF_TYPE" == "tag" ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION="$(python -c 'import json; print(json.load(open("update-manifest.json", encoding="utf-8"))["latest_version"])')"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version: $VERSION (expected exact X.Y.Z)" >&2
            exit 1
          fi
          if [[ "$REF_TYPE" == "tag" && "$REF_NAME" != "v$VERSION" ]]; then
            echo "Git tag must be exactly v$VERSION" >&2
            exit 1
          fi

          python scripts/ci_validate_release.py --expected "$VERSION"
          BUILD_DATE="$(git show -s --format=%cI "$GITHUB_SHA")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE" >> "$GITHUB_OUTPUT"

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-ci.txt
            requirements-app-direct.txt
            requirements-ci-direct.txt

      - name: Set up the pinned dependency lock tool
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"

      - name: Verify hash-locked dependency sets
        run: python scripts/lock_dependencies.py --check

      - name: Install application and CI dependencies
        run: >-
          python -m pip install
          --require-hashes
          --requirement requirements-ci.txt

      - name: Verify installed dependency compatibility
        run: python -m pip check

      - name: Audit Python dependencies
        run: python -m pip_audit --requirement requirements-ci.txt --strict

      - name: Scan Python code for unallowlisted high severity issues
        run: python -m bandit -q -r ditaknet app -x tests -lll --skip B501

      # DitakNet's LAN probes deliberately accept self-signed device
      # certificates. Keep that exception bounded to the two probe modules;
      # Bandit's B501 check remains skipped only because these are intentional.
      - name: Bound intentional TLS verification exceptions
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t MATCHES < <(git grep -n -E 'verify\s*=\s*False' -- '*.py' || true)
          if (( ${#MATCHES[@]} > 2 )); then
            printf 'Too many verify=False exceptions:\n%s\n' "${MATCHES[*]}" >&2
            exit 1
          fi
          for MATCH in "${MATCHES[@]}"; do
            FILE="${MATCH%%:*}"
            case "$FILE" in
              ditaknet/core/checks/http.py|ditaknet/discovery/scanner.py) ;;
              *)
                echo "Unexpected TLS verification exception: $MATCH" >&2
                exit 1
                ;;
            esac
          done

      - name: Scan tracked files for common secret formats
        shell: bash
        run: |
          set -euo pipefail
          PATTERN='(AKIA|ASIA)[0-9A-Z]{16}|github_pat_[A-Za-z0-9_]{20,}|gh[pousr]_[A-Za-z0-9]{20,}|xox[baprs]-[A-Za-z0-9-]{10,}|-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----'
          if git grep -I -n -E "$PATTERN" -- .; then
            echo "Potential committed secret detected; remove it before release." >&2
            exit 1
          fi

      - name: Compile Python sources
        run: >-
          python -m compileall -q ditaknet app
          scripts/ci_validate_release.py scripts/lock_dependencies.py

      - name: Run test suite
        env:
          APP_ENV: development
          DATA_DIR: ${{ runner.temp }}/ditaknet-data
          LOG_DIR: ${{ runner.temp }}/ditaknet-logs
          BACKUP_DIR: ${{ runner.temp }}/ditaknet-backups
          PLUGIN_DIR: ${{ runner.temp }}/ditaknet-plugins
        run: |
          mkdir -p "$DATA_DIR" "$LOG_DIR" "$BACKUP_DIR" "$PLUGIN_DIR"
          python -m pytest -q

      - name: Validate Docker and TrueNAS Compose files
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          ROOT="${RUNNER_TEMP}/ditaknet-compose"
          mkdir -p "$ROOT"/{data,logs,backups,plugins}
          cat > "$ROOT/truenas.env" <<EOF
          DITAKNET_VERSION=$RELEASE_VERSION
          DITAKNET_DATA_PATH=$ROOT/data
          DITAKNET_LOGS_PATH=$ROOT/logs
          DITAKNET_BACKUPS_PATH=$ROOT/backups
          DITAKNET_PLUGINS_PATH=$ROOT/plugins
          EOF

          docker compose -f docker-compose.yml config >/dev/null
          docker compose --env-file "$ROOT/truenas.env" -f truenas/docker-compose.yml config >/dev/null
          docker compose --env-file "$ROOT/truenas.env" -f truenas/docker-compose.host-network.yml config >/dev/null

          if grep -E '^\s*build:' truenas/docker-compose.yml truenas/docker-compose.host-network.yml; then
            echo "TrueNAS definitions must pull a published image, not build locally." >&2
            exit 1
          fi
          if grep -E '^\s*ports:' truenas/docker-compose.host-network.yml; then
            echo "Host-network TrueNAS definition must not publish ports." >&2
            exit 1
          fi

  image-smoke:
    name: Build and smoke-test container
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build local image without publishing
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ditaknet:ci-local
          build-args: |
            APP_VERSION=${{ needs.quality.outputs.version }}
            IMAGE_TAG=${{ needs.quality.outputs.version }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ needs.quality.outputs.build_date }}
          labels: |
            org.opencontainers.image.title=DitakNet
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.quality.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ needs.quality.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container and verify health/web endpoints
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.quality.outputs.version }}
        run: |
          set -euo pipefail
          ROOT="${RUNNER_TEMP}/ditaknet-smoke"
          mkdir -p "$ROOT"/{data,logs,backups,plugins}
          docker run -d --name ditaknet-ci-smoke \
            -p 127.0.0.1:5833:5833 \
            --cap-add NET_RAW \
            --security-opt no-new-privileges:true \
            -e APP_ENV=production \
            -e APP_VERSION="$RELEASE_VERSION" \
            -e IMAGE_TAG="$RELEASE_VERSION" \
            -v "$ROOT/data:/app/data" \
            -v "$ROOT/logs:/app/logs" \
            -v "$ROOT/backups:/app/backups" \
            -v "$ROOT/plugins:/app/plugins" \
            ditaknet:ci-local

          HEALTHY=0
          for _ in $(seq 1 40); do
            if curl --fail --silent --show-error \
              http://127.0.0.1:5833/health >"$ROOT/health.json"; then
              HEALTHY=1
              break
            fi
            sleep 2
          done
          if [[ "$HEALTHY" != "1" ]]; then
            docker logs ditaknet-ci-smoke
            exit 1
          fi

          grep -q '"status":"healthy"' "$ROOT/health.json"
          STATUS="$(curl --silent --show-error --output "$ROOT/login.html" \
            --write-out '%{http_code}' http://127.0.0.1:5833/login)"
          [[ "$STATUS" =~ ^(200|302|303)$ ]]

      - name: Remove smoke-test container
        if: always()
        run: docker rm -f ditaknet-ci-smoke >/dev/null 2>&1 || true

      - name: Generate an SPDX SBOM from the smoke-tested image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ditaknet:ci-local
          format: spdx-json
          output-file: ${{ runner.temp }}/ditaknet-image.spdx.json
          syft-version: v1.48.0
          dependency-snapshot: false
          upload-artifact: false
          upload-release-assets: false

      - name: Export the smoke-tested release image
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        run: docker save ditaknet:ci-local | gzip -9 > "${RUNNER_TEMP}/ditaknet-image.tar.gz"

      - name: Store the smoke-tested release image
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ditaknet-image-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/ditaknet-image.tar.gz
            ${{ runner.temp }}/ditaknet-image.spdx.json
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish immutable GHCR release
    needs:
      - quality
      - image-smoke
    if: >-
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      (github.event_name == 'workflow_dispatch' &&
       github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download the smoke-tested release image
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ditaknet-image-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ditaknet-release

      - name: Load the smoke-tested release image
        run: gunzip --stdout "${RUNNER_TEMP}/ditaknet-release/ditaknet-image.tar.gz" | docker load

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Refuse to overwrite an immutable version tag
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.quality.outputs.version }}
        run: |
          set -euo pipefail
          set +e
          INSPECT_OUTPUT="$(docker buildx imagetools inspect \
            "$IMAGE:$RELEASE_VERSION" 2>&1)"
          INSPECT_STATUS=$?
          set -e
          if [[ "$INSPECT_STATUS" == "0" ]]; then
            echo "$IMAGE:$RELEASE_VERSION already exists; version tags are immutable." >&2
            exit 1
          fi
          if ! grep -Eqi '(manifest unknown|name unknown|not found)' \
            <<<"$INSPECT_OUTPUT"; then
            echo "Could not safely determine whether the release tag exists:" >&2
            echo "$INSPECT_OUTPUT" >&2
            exit 1
          fi

      - name: Publish the exact smoke-tested image
        id: push
        env:
          RELEASE_VERSION: ${{ needs.quality.outputs.version }}
        run: |
          set -euo pipefail
          TARGET="$IMAGE:$RELEASE_VERSION"
          docker tag ditaknet:ci-local "$TARGET"
          PUSH_OUTPUT="$(docker push "$TARGET" 2>&1)"
          echo "$PUSH_OUTPUT"
          DIGEST="$(printf '%s\n' "$PUSH_OUTPUT" | awk '
            { for (i = 1; i <= NF; i++)
                if ($i == "digest:" && $(i + 1) ~ /^sha256:/) print $(i + 1) }
          ' | tail -n 1)"
          if [[ ! "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "GHCR did not return a valid manifest digest." >&2
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance for the published image digest
        id: provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Attest the smoke-tested image SBOM
        id: sbom
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: ${{ runner.temp }}/ditaknet-release/ditaknet-image.spdx.json
          push-to-registry: true
          create-storage-record: false

      - name: Write release summary
        env:
          RELEASE_VERSION: ${{ needs.quality.outputs.version }}
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          {
            echo "## DitakNet GHCR release"
            echo
            echo "- Version: \`$RELEASE_VERSION\`"
            echo "- Image: \`$IMAGE:$RELEASE_VERSION\`"
            echo "- Digest: \`$IMAGE_DIGEST\`"
            echo "- Build provenance: signed and attached by digest"
            echo "- SBOM: SPDX JSON, signed and attached by digest"
            echo "- Floating tags were not modified"
          } >> "$GITHUB_STEP_SUMMARY"
