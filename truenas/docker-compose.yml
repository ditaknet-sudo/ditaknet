# ==========================================================================
# DitakNet — TrueNAS SCALE Custom App (bridge networking)
# --------------------------------------------------------------------------
# Install via: Apps → Discover → Custom App / Install via YAML
# Uses a published GHCR image (no local build).
#
# 1) Copy truenas/.env.example → .env next to this file (or set vars in UI)
# 2) Adjust DITAKNET_*_PATH to your pool datasets
# 3) Pin DITAKNET_VERSION to an exact release (e.g. 2.0.2).
#
# For better LAN discovery / ARP visibility, prefer:
#   docker-compose.host-network.yml
# ==========================================================================

services:
  ditaknet:
    image: ghcr.io/ditaknet-sudo/ditaknet:${DITAKNET_VERSION:-2.0.2}
    pull_policy: missing
    restart: unless-stopped
    init: true
    user: "568:568"
    read_only: true
    privileged: false
    pids_limit: 256
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    ports:
      - "${DITAKNET_BIND_ADDRESS:-0.0.0.0}:${DITAKNET_PORT:-5833}:5833/tcp"
    volumes:
      - type: bind
        source: ${DITAKNET_DATA_PATH:-/mnt/tank/apps/ditaknet/data}
        target: /app/data
        bind:
          create_host_path: false
      - type: bind
        source: ${DITAKNET_LOGS_PATH:-/mnt/tank/apps/ditaknet/logs}
        target: /app/logs
        bind:
          create_host_path: false
      - type: bind
        source: ${DITAKNET_BACKUPS_PATH:-/mnt/tank/apps/ditaknet/backups}
        target: /app/backups
        bind:
          create_host_path: false
      - type: bind
        source: ${DITAKNET_PLUGINS_PATH:-/mnt/tank/apps/ditaknet/plugins}
        target: /app/plugins
        bind:
          create_host_path: false
    tmpfs:
      - /tmp:size=64m,mode=1770,uid=568,gid=568,noexec,nosuid,nodev
    environment:
      APP_ENV: production
      APP_HOST: "0.0.0.0"
      APP_PORT: "5833"
      HOME: /tmp
      TMPDIR: /tmp
      TZ: ${TZ:-Etc/UTC}
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      BACKUP_DIR: /app/backups
      PLUGIN_DIR: /app/plugins
      DITAKNET_UPDATE_CHANNEL: ${DITAKNET_UPDATE_CHANNEL:-stable}
      DITAKNET_UPDATE_SIGNATURE_REQUIRED: "true"
      # Optional LAN DNS for hostname discovery (set to your router if needed)
      # DISCOVERY_DNS_SERVERS: "192.168.1.1"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5833/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
