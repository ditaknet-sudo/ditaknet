# ==========================================================================
# DitakNet — TrueNAS SCALE Custom App (host networking)
# --------------------------------------------------------------------------
# Use when LAN discovery / ping / ARP / MAC visibility matters.
# Host network shares the TrueNAS stack — do NOT declare ports:.
# UI: http://TRUENAS-IP:5833
# Application name in TrueNAS UI: ditaknet  (not "ditak")
#
# Image is pinned. Do not use :latest in production.
# Replace pool name "tank" below if your dataset path differs.
# ==========================================================================

services:
  ditaknet:
    image: ghcr.io/ditaknet-sudo/ditaknet:2.0.1
    restart: unless-stopped
    network_mode: host
    volumes:
      - /mnt/tank/apps/ditaknet/data:/app/data
      - /mnt/tank/apps/ditaknet/logs:/app/logs
      - /mnt/tank/apps/ditaknet/backups:/app/backups
      - /mnt/tank/apps/ditaknet/plugins:/app/plugins
    cap_add:
      - NET_RAW
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "5833"
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      BACKUP_DIR: /app/backups
      PLUGIN_DIR: /app/plugins
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5833/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 5
