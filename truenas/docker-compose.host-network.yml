# ==========================================================================
# DitakNet — TrueNAS SCALE Custom App (host networking)
# --------------------------------------------------------------------------
# Use this variant when LAN discovery / ping / ARP / MAC visibility matters.
# Host network shares the TrueNAS network stack — do NOT declare ports:.
# The UI is still reached at http://TRUENAS-IP:5833
#
# Pin DITAKNET_VERSION to an exact release; floating tags are unsupported.
# ==========================================================================

services:
  ditaknet:
    image: ghcr.io/ditaknet-sudo/ditaknet:${DITAKNET_VERSION:-2.0.1}
    container_name: ditaknet
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${DITAKNET_DATA_PATH}:/app/data
      - ${DITAKNET_LOGS_PATH}:/app/logs
      - ${DITAKNET_BACKUPS_PATH}:/app/backups
      - ${DITAKNET_PLUGINS_PATH}:/app/plugins
    cap_add:
      - NET_RAW
    environment:
      APP_ENV: production
      APP_HOST: "0.0.0.0"
      APP_PORT: "5833"
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      BACKUP_DIR: /app/backups
      PLUGIN_DIR: /app/plugins
      # Optional: DISCOVERY_DNS_SERVERS: "192.168.1.1"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5833/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
