services:
  ditaknet:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-2.0.1}
        IMAGE_TAG: ${IMAGE_TAG:-2.0.1}
        BUILD_COMMIT: ${BUILD_COMMIT:-}
        BUILD_DATE: ${BUILD_DATE:-}
    image: ditaknet:${IMAGE_TAG:-2.0.1}
    container_name: ditaknet-monitoring
    restart: unless-stopped
    env_file:
      - ./config/runtime.env
    ports:
      - "5833:5833"
    dns:
      - ${DISCOVERY_DNS:-8.8.8.8}
      - 8.8.8.8
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./plugins:/app/plugins
    cap_add:
      - NET_RAW
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5833/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

    # For Linux/TrueNAS SCALE, host networking gives the most accurate LAN
    # discovery and ARP/MAC visibility. Enable it there only, and remove ports:
    # network_mode: host
