{% extends "base.html" %}
{% block title %}New employee{% endblock %}
{% block header %}New employee{% endblock %}
{% block content %}
<form method="post" action="/employees/create" class="vstack gap-3" style="max-width:560px">
  <div><label class="form-label">Full name</label><input class="form-control" name="full_name" required></div>
  <div class="row g-2">
    <div class="col"><label class="form-label">Department</label><select class="form-select" name="department_id"><option value="">—</option>{% for d in departments %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}</select></div>
    <div class="col"><label class="form-label">Group</label><select class="form-select" name="group_id"><option value="">—</option>{% for g in groups %}<option value="{{ g.id }}">{{ g.name }}</option>{% endfor %}</select></div>
  </div>
  <div><label class="form-label">Default shift</label><select class="form-select" name="default_shift_id"><option value="">—</option>{% for s in shifts %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select></div>
  <div class="row g-2">
    <div class="col"><label class="form-label">Position</label><input class="form-control" name="position"></div>
    <div class="col"><label class="form-label">Employee code</label><input class="form-control" name="employee_code"></div>
  </div>
  <div class="row g-2">
    <div class="col"><label class="form-label">Email</label><input class="form-control" name="email"></div>
    <div class="col"><label class="form-label">Phone</label><input class="form-control" name="phone"></div>
  </div>
  <div class="row g-2">
    <div class="col"><label class="form-label">Employment status</label><select class="form-select" name="employment_status"><option value="active">active</option><option value="inactive">inactive</option><option value="suspended">suspended</option></select></div>
    <div class="col"><label class="form-label">Hire date</label><input class="form-control" type="date" name="hire_date"></div>
  </div>
  <div><label class="form-label">Notes</label><textarea class="form-control" name="notes" rows="2"></textarea></div>
  <button class="btn btn-primary" type="submit">Create</button>
</form>
{% endblock %}
