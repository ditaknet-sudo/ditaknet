{% extends "base.html" %}
{% block title %}New department{% endblock %}
{% block header %}New department{% endblock %}
{% block content %}
<form method="post" action="/departments/create" class="vstack gap-3" style="max-width:480px">
  <div><label class="form-label">Name</label><input class="form-control" name="name" required></div>
  <div><label class="form-label">Description</label><input class="form-control" name="description"></div>
  <div><label class="form-label">Manager username</label><input class="form-control" name="manager_user_id"></div>
  <button class="btn btn-primary" type="submit">Create</button>
</form>
{% endblock %}
