{% extends "base.html" %}
{% block title %}{{ t('discovery.new_scan') }} — {{ app_name }}{% endblock %}
{% block page_title %}{{ t('discovery.new_scan') }}{% endblock %}
{% block content %}
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form method="post" class="card card-body">
  <div class="mb-3">
    <label class="form-label">{{ t('discovery.profile.normal') }}</label>
    <select name="profile" class="form-select">
      <option value="quick">{{ t('discovery.profile.quick') }}</option>
      <option value="normal" selected>{{ t('discovery.profile.normal') }}</option>
      <option value="deep">{{ t('discovery.profile.deep') }}</option>
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">{{ t('discovery.subnets') }}</label>
    <input class="form-control" name="subnets" placeholder="192.168.1.0/24" value="{{ local_subnets[0] if local_subnets else '' }}">
    <div class="form-text">{{ t('discovery.subnet_hint') }}</div>
  </div>
  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" name="detect_local" value="1" id="detect_local">
    <label class="form-check-label" for="detect_local">{{ t('discovery.detect_local') }}</label>
  </div>
  <button class="btn btn-primary">{{ t('discovery.start_scan') }}</button>
</form>
{% endblock %}
