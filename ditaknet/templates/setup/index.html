{% extends "setup/base.html" %}
{% block setup_content %}
<h1 class="h4">{{ t('setup.title') }}</h1>
<p class="text-muted">{{ t('setup.subtitle') }}</p>
<p>{{ t('setup.step.language') }}</p>
<form method="post" action="/setup/language">
  <div class="list-group mb-3">
    {% for code in languages %}
    <label class="list-group-item list-group-item-action">
      <input class="form-check-input me-2" type="radio" name="language" value="{{ code }}" {% if code == lang %}checked{% endif %}>
      <strong>{{ language_labels.get(code, code|upper) }}</strong>
    </label>
    {% endfor %}
  </div>
  <button class="btn btn-primary">{{ t('setup.continue') }}</button>
</form>
<div class="text-center mt-4 pt-3 border-top">
  <p class="text-muted small mb-2">{{ t('setup.restore.or') }}</p>
  <a href="/setup/restore" class="btn btn-outline-secondary">{{ t('restore_backup') }}</a>
</div>
{% endblock %}
