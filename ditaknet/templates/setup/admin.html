{% extends "setup/base.html" %}
{% block setup_content %}
<h1 class="h4">{{ t('setup.step.admin') }}</h1>
<p class="text-muted">{{ t('setup.admin.subtitle') }}</p>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form method="post">
  <div class="mb-3">
    <label class="form-label">{{ t('setup.system.name') }}</label>
    <input class="form-control" name="system_name" value="DitakNet" required>
  </div>
  <div class="mb-3">
    <label class="form-label">{{ t('setup.admin.username') }}</label>
    <input class="form-control" name="username" value="admin" required>
  </div>
  <div class="mb-3">
    <label class="form-label">{{ t('setup.admin.password') }}</label>
    <input class="form-control" type="password" name="password" required minlength="8">
  </div>
  <div class="mb-3">
    <label class="form-label">{{ t('setup.admin.password_confirm') }}</label>
    <input class="form-control" type="password" name="password_confirm" required minlength="8">
  </div>
  <button class="btn btn-primary">{{ t('setup.continue') }}</button>
</form>
{% endblock %}
